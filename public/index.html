<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cubepath API — Playground</title>
  <meta name="description" content="Interactive playground for the Cubepath API. Test endpoints, stream chat responses, and explore the API in real time." />
  <link rel="stylesheet" href="./index.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='20' y='20' width='60' height='60' rx='12' fill='none' stroke='%2322d3ee' stroke-width='8'/><rect x='40' y='40' width='20' height='20' rx='4' fill='%2322d3ee'/></svg>" />
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <div class="logo-icon"></div>
        <div class="logo-text">cubepath<span>/api</span></div>
      </div>
      <div class="status-badge checking" id="status-badge">
        <span class="status-dot"></span>
        <span id="status-text">checking…</span>
      </div>
    </header>

    <!-- Hero -->
    <section class="hero">
      <h1>API Playground</h1>
      <p>Explora y prueba los endpoints de Cubepath. Envía mensajes al chat con streaming en tiempo real.</p>
    </section>

    <!-- Endpoints -->
    <div class="endpoints">
      <button class="endpoint-card" id="ep-health" onclick="selectEndpoint('health')">
        <span class="method-badge get">GET</span>
        <span class="endpoint-path">/health</span>
      </button>
      <button class="endpoint-card active" id="ep-chat" onclick="selectEndpoint('chat')">
        <span class="method-badge post">POST</span>
        <span class="endpoint-path">/chat</span>
      </button>
      <button class="endpoint-card" id="ep-users-get" onclick="selectEndpoint('users-get')">
        <span class="method-badge get">GET</span>
        <span class="endpoint-path">/users</span>
      </button>
      <button class="endpoint-card" id="ep-users-get-id" onclick="selectEndpoint('users-get-id')">
        <span class="method-badge get">GET</span>
        <span class="endpoint-path">/users/:id</span>
      </button>
      <button class="endpoint-card" id="ep-users-post" onclick="selectEndpoint('users-post')">
        <span class="method-badge post">POST</span>
        <span class="endpoint-path">/users</span>
      </button>
      <button class="endpoint-card" id="ep-users-put" onclick="selectEndpoint('users-put')">
        <span class="method-badge put">PUT</span>
        <span class="endpoint-path">/users/:id</span>
      </button>
      <button class="endpoint-card" id="ep-users-delete" onclick="selectEndpoint('users-delete')">
        <span class="method-badge delete">DEL</span>
        <span class="endpoint-path">/users/:id</span>
      </button>
    </div>

    <!-- Response Panel -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title" id="panel-title">Response</span>
        <div class="panel-actions">
          <button class="btn-clear" id="btn-clear" onclick="clearResponse()">Clear</button>
        </div>
      </div>

      <div class="response-area" id="response-area">
        <div class="response-placeholder" id="placeholder">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
          </svg>
          <p>Selecciona un endpoint y envía una petición</p>
        </div>
      </div>

      <div class="input-area" id="input-area">
        <div class="input-wrapper" id="id-wrapper" style="display: none; max-width: 80px;">
          <input type="text" id="id-input" placeholder="ID" />
        </div>
        <div class="input-wrapper" id="body-wrapper">
          <textarea
            id="message-input"
            rows="1"
            placeholder="Escribe tu mensaje…"
            onkeydown="handleKeydown(event)"
            oninput="autoResize(this)"
          ></textarea>
        </div>
        <button class="btn-send" id="btn-send" onclick="sendRequest()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
          Enviar
        </button>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer-left">cubepath © 2026</div>
      <div class="footer-right">
        <a class="footer-link" href="/health" target="_blank">/health</a>
        <a class="footer-link" href="/chat" target="_blank">/chat</a>
      </div>
    </footer>
  </div>

  <script src="./frontend.js" type="module"></script>
</body>
</html>
